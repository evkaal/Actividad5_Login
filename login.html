<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-card">
        <h3 class="text-center fw-bold mb-4 text-dark">Iniciar Sesión</h3>
        
        <form id="formLogin">
            <div class="mb-3">
                <label class="form-label fw-semibold">Correo Electrónico</label>
                <input type="email" id="loginEmail" class="form-control" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-semibold">Contraseña</label>
                <input type="password" id="loginPassword" class="form-control" required placeholder="Ej: Admin123@">
                <div class="form-text text-muted" style="font-size: 0.8rem;">Debe incluir 8+ caracteres, mayúscula, minúscula, número y símbolo.</div>
            </div>
            
            <div id="loginError" class="alert alert-danger d-none py-2" role="alert">
                Credenciales inválidas. Verifica el formato.
            </div>
            
            <button type="button" class="btn btn-dark w-100 fw-bold py-2" onclick="ingresarSistema()">Ingresar al Sistema</button>
        </form>
    </div>

    <script src="js/utileria.js"></script>
    <script>
        function ingresarSistema() {
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;
            const errorDiv = document.getElementById("loginError");

            // Usamos las funciones exactas de utileria.js
            if (Correo(email) && validarPassword(password)) {
                // Guardar usuario y entrar al sistema
                localStorage.setItem("usuarioLogueado", email);
                window.location.href = "index.html";
            } else {
                errorDiv.classList.remove("d-none");
            }
        }
    </script>
</body>
</html>
